{% extends 'base.html' %}
{% load static %}

{% block body %}
<section class="h-100 bg-dark">
  {% include 'messages.html' %}
  <div class="container py-5 h-100">
    <div class="row d-flex justify-content-center align-items-center h-100">
      <div class="col">
        <div class="card card-registration my-4">
          <div class="row g-0">
            <div class="col-xl-6 d-none d-xl-block">
              <img src="https://mdbcdn.b-cdn.net/img/Photos/new-templates/bootstrap-registration/img4.webp"
                alt="Sample photo"
                class="img-fluid"
                style="border-top-left-radius: .25rem; border-bottom-left-radius: .25rem;" />
            </div>

            <div class="col-xl-6">
              <div class="card-body p-md-5 text-black">
                <h3 class="mb-5 text-uppercase">Sign Up</h3>

                <!-- ✅ Corrected form tag -->
                <form method="POST" action="{% url 'register' %}">
                  {% csrf_token %}

                  <div class="form-group mb-3">
                    <label for="name">Name</label>
                    <input type="text" class="form-control" id="name" name="name" placeholder="Full Name" required>
                  </div>

                  <div class="form-group mb-3">
                    <label for="username">Username</label>
                    <input type="text" class="form-control" id="username" name="username" placeholder="Choose a username" required>
                  </div>

                  <div class="form-group mb-3">
                    <label for="number">Phone Number</label>
                    <input type="tel" class="form-control" id="number" name="number" placeholder="Eg: 9120001478" pattern="[0-9]{10}" required>
                  </div>

                  <div class="form-group mb-3">
                    <label for="email">Email address</label>
                    <input type="email" class="form-control" id="email" name="email" placeholder="Enter email" required>
                    <small id="emailHelp" class="form-text text-muted">
                      We'll never share your email with anyone else.
                    </small>
                  </div>

                  <div class="form-group mb-3">
                    <label for="password">Password</label>
                    <input type="password" class="form-control" id="password" name="password" placeholder="Password" required>
                  </div>

                  <div class="form-group mb-4">
                    <label for="password2">Confirm Password</label>
                    <input type="password" class="form-control" id="password2" name="password2" placeholder="Confirm Password" required>
                  </div>

                  <div class="d-flex justify-content-end pt-3">
                    <button type="submit" class="btn btn-warning btn-lg ms-2">Submit</button>
                  </div>
                </form>

                <div class="text-center mt-3">
                  <p>Already have an account? 
                    <a href="{% url 'signin' %}" class="text-decoration-none">Sign in here</a>.
                  </p>
                </div>

              </div>
            </div>
          </div> <!-- row g-0 -->
        </div> <!-- card -->
      </div>
    </div>
  </div>
</section>
{% endblock body %}
